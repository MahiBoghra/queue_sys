<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>University Hall Ticket Queue Portal</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <main class="container">
      <section class="card" id="login-screen">
        <h1 class="title">University Hall Ticket Portal</h1>
        <p class="subtitle">
          Secure access with virtual queue and controlled download flow.
        </p>

        <div class="mode-switch" role="tablist" aria-label="Authentication mode">
          <button id="login-tab" class="secondary active" type="button">Login</button>
          <button id="signup-tab" class="secondary" type="button">Signup</button>
        </div>

        <form id="login-form" class="form">
          <label>
            Role
            <select name="role" required>
              <option value="student">Student</option>
              <option value="faculty">Faculty</option>
            </select>
          </label>

          <label>
            Roll Number / Faculty ID
            <input type="text" name="identifier" placeholder="2026CS001 or FAC1001" required />
          </label>

          <label>
            Password
            <input type="password" name="password" placeholder="Enter password" required />
          </label>

          <button type="submit">Login</button>
        </form>

        <form id="signup-form" class="form hidden">
          <label>
            Role
            <select name="role" id="signup-role" required>
              <option value="student">Student</option>
              <option value="faculty">Faculty</option>
            </select>
          </label>

          <label>
            Full Name
            <input type="text" name="name" placeholder="Enter full name" required />
          </label>

          <label>
            Roll Number / Faculty ID
            <input type="text" name="identifier" placeholder="2026CS050 or FAC1120" required />
          </label>

          <label>
            Password
            <input type="password" name="password" placeholder="Create password" required />
          </label>

          <div id="student-signup-fields" class="form-group">
            <label>
              Course
              <input type="text" name="course" placeholder="B.Tech CSE" />
            </label>
            <label>
              Semester
              <input type="text" name="semester" placeholder="8" />
            </label>
            <label>
              Exam Date
              <input type="date" name="examDate" />
            </label>
            <label>
              Center
              <input type="text" name="center" placeholder="University Main Campus" />
            </label>
          </div>

          <div id="faculty-signup-fields" class="form-group hidden">
            <label>
              Department
              <input type="text" name="department" placeholder="Computer Science" />
            </label>
            <label>
              Designation
              <input type="text" name="designation" placeholder="Professor" />
            </label>
          </div>

          <button type="submit">Create Account</button>
        </form>

        <p id="login-message" class="message"></p>
      </section>

      <section class="card hidden" id="dashboard-screen">
        <div class="header-row">
          <div>
            <h2 id="welcome-text">Welcome</h2>
            <p id="session-timer" class="small-text"></p>
          </div>
          <button id="logout-btn" class="secondary">Logout</button>
        </div>

        <div class="exam-grid" id="student-grid">
          <div class="tile">
            <h3>Course</h3>
            <p id="course"></p>
          </div>
          <div class="tile">
            <h3>Semester</h3>
            <p id="semester"></p>
          </div>
          <div class="tile">
            <h3>Exam Date</h3>
            <p id="examDate"></p>
          </div>
          <div class="tile">
            <h3>Center</h3>
            <p id="center"></p>
          </div>
        </div>

        <div id="faculty-grid" class="exam-grid hidden">
          <div class="tile">
            <h3>Department</h3>
            <p id="department"></p>
          </div>
          <div class="tile">
            <h3>Designation</h3>
            <p id="designation"></p>
          </div>
        </div>

        <div class="actions" id="student-actions">
          <button id="request-btn">Generate Hall Ticket</button>
        </div>

        <div class="status-box" id="status-box">
          <h3>Status</h3>
          <p id="status-text">No active request yet.</p>
          <p id="queue-position" class="small-text"></p>
        </div>

        <div id="download-box" class="download-box hidden">
          <h3>Hall Ticket Ready</h3>
          <p id="hallticket-exam"></p>
          <a id="download-link" href="#" target="_blank" rel="noreferrer">Download Hall Ticket</a>
        </div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
